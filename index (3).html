<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Care Town - Smart City</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Nunito', sans-serif;
      background: #fff0f5;
      min-height: 100vh;
      padding: 24px;
    }
    .dashboard {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 16px;
      max-width: 960px;
      margin: 0 auto;
    }
    .card {
      border-radius: 20px;
      padding: 18px;
    }
    .card-logo {
      background: #fde8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      min-height: 120px;
    }
    .logo-wrap { text-align: center; }
    .logo-main { font-size: 30px; font-weight: 800; line-height: 1; }
    .logo-care { color: #d81b60; }
    .logo-heart { color: #e91e63; }
    .logo-town {
      background: #3d1a7a;
      color: white;
      padding: 2px 12px;
      border-radius: 8px;
    }
    .logo-sub { font-size: 13px; color: #e91e63; font-style: italic; margin-top: 4px; }

    .card-weather { background: #daeeff; }
    .weather-label { font-size: 14px; font-weight: 700; color: #1565c0; margin-bottom: 10px; }
    .weather-emoji { font-size: 42px; margin-bottom: 8px; }
    .weather-stats { display: flex; gap: 18px; font-size: 20px; font-weight: 700; color: #1565c0; }

    .card-house { background: #ede7f6; }
    .card-city { background: #fce4ec; }
    .card-carnaval { background: #fff9e6; }
    .card-member { background: #e8f5e9; grid-column: span 2; }

    .section-title {
      font-size: 15px;
      font-weight: 800;
      margin-bottom: 12px;
    }
    .title-purple { color: #6a1b9a; }
    .title-pink { color: #c2185b; }
    .title-orange { color: #e65100; }
    .title-green { color: #2e7d32; }

    .device-row {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.75);
      border-radius: 14px;
      padding: 10px 12px;
      margin-bottom: 8px;
    }
    .device-icon {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .icon-purple { background: #d1c4e9; }
    .icon-pink   { background: #f8bbd0; }
    .icon-blue   { background: #bbdefb; }
    .icon-orange { background: #ffe0b2; }

    .device-info { flex: 1; }
    .device-name { font-size: 13px; font-weight: 700; color: #333; }
    .device-status { font-size: 11px; color: #777; margin-top: 2px; }

    /* Toggle switch */
    .toggle { position: relative; width: 38px; height: 22px; cursor: pointer; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: #ccc; border-radius: 22px; transition: 0.3s;
    }
    .slider:before {
      content: "";
      position: absolute;
      height: 16px; width: 16px;
      left: 3px; bottom: 3px;
      background: white; border-radius: 50%; transition: 0.3s;
    }
    input:checked + .slider { background: #e91e63; }
    input:checked + .slider:before { transform: translateX(16px); }

    /* Member */
    .member-avatars { display: flex; gap: 12px; justify-content: center; margin-top: 8px; }
    .avatar {
      width: 54px; height: 54px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
    }
    .av1 { background: #f8bbd0; }
    .av2 { background: #bbdefb; }
    .av3 { background: #c8e6c9; }
    .av4 { background: #ffe0b2; }
  </style>
</head>
<body>
<div class="dashboard">

  <!-- Logo -->
  <div class="card card-logo">
    <div class="logo-wrap">
      <div class="logo-main">
        <span class="logo-care">CARE</span><span class="logo-heart">♥</span><span class="logo-town"> town</span>
      </div>
      <div class="logo-sub">Smart city</div>
    </div>
  </div>

  <!-- Weather -->
  <div class="card card-weather">
    <div class="weather-label">today's weather</div>
    <div class="weather-emoji">🌥️⭐</div>
    <div class="weather-stats">
      <span>💧 30%</span>
      <span style="color:#90caf9">|</span>
      <span>🌡️ 30°c</span>
    </div>
  </div>

  <!-- House Features -->
  <div class="card card-house">
    <div class="section-title title-purple">🦋 House Features! 🦋</div>
    <div class="device-row">
      <div class="device-icon icon-purple">🚪</div>
      <div class="device-info">
        <div class="device-name">Smart Door</div>
        <div class="device-status" id="s-door">Status: OFF</div>
      </div>
      <label class="toggle"><input type="checkbox" onchange="toggle(this,'s-door')"><span class="slider"></span></label>
    </div>
    <div class="device-row">
      <div class="device-icon icon-purple">🪔</div>
      <div class="device-info">
        <div class="device-name">Smart Lamp</div>
        <div class="device-status" id="s-lamp">Status: ON</div>
      </div>
      <label class="toggle"><input type="checkbox" checked onchange="toggle(this,'s-lamp')"><span class="slider"></span></label>
    </div>
  </div>

  <!-- Carnaval -->
  <div class="card card-carnaval">
    <div class="section-title title-orange">🐶 Carnaval</div>
    <div class="device-row">
      <div class="device-icon icon-orange">🎠</div>
      <div class="device-info">
        <div class="device-name">Rainbow Chair</div>
        <div class="device-status" id="s-chair">Status: OFF</div>
      </div>
      <label class="toggle"><input type="checkbox" onchange="toggle(this,'s-chair')"><span class="slider"></span></label>
    </div>
  </div>

  <!-- City -->
  <div class="card card-city">
    <div class="section-title title-pink">🐭 City 🌈</div>
    <div class="device-row">
      <div class="device-icon icon-pink">💡</div>
      <div class="device-info">
        <div class="device-name">Street Light</div>
        <div class="device-status" id="s-light">Status: ON</div>
      </div>
      <label class="toggle"><input type="checkbox" checked onchange="toggle(this,'s-light')"><span class="slider"></span></label>
    </div>
    <div class="device-row">
      <div class="device-icon icon-blue">🌀</div>
      <div class="device-info">
        <div class="device-name">City Fan</div>
        <div class="device-status" id="s-fan">Status: ON</div>
      </div>
      <label class="toggle"><input type="checkbox" checked onchange="toggle(this,'s-fan')"><span class="slider"></span></label>
    </div>
  </div>

  <!-- Member -->
  <div class="card card-member">
    <div class="section-title title-green">🐭 Our Member ⚡</div>
    <div class="member-avatars">
      <div class="avatar av1">🐻‍❄️</div>
      <div class="avatar av2">🐨</div>
      <div class="avatar av3">🐸</div>
      <div class="avatar av4">🦁</div>
    </div>
  </div>

</div>

<script>
  function toggle(el, id) {
    document.getElementById(id).textContent = 'Status: ' + (el.checked ? 'ON' : 'OFF');
  }
</script>
</body>
</html>
